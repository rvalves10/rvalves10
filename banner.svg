<svg viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Richard Victor - Backend and AI Developer">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#3776AB" stroke-width="1" opacity="0.07"/>
    </pattern>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="400" fill="#0d1117"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#vignette)"/>

  <!-- ambient glow behind terminal -->
  <ellipse cx="600" cy="210" rx="420" ry="150" fill="#3776AB" opacity="0.10" filter="url(#soft)"/>

  <!-- blueprint corner annotations -->
  <text x="44" y="52" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#30363d">// build-log — profile.readme</text>
  <text x="1156" y="372" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#30363d">status: shipping ▸</text>

  <!-- terminal window -->
  <g>
    <rect x="120" y="64" width="960" height="272" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- title bar -->
    <circle cx="152" cy="92" r="6" fill="#ff5f56"/>
    <circle cx="174" cy="92" r="6" fill="#ffbd2e"/>
    <circle cx="196" cy="92" r="6" fill="#27c93f"/>
    <text x="224" y="97" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#8b949e">rvalves10 · ~/richard-victor</text>
    <line x1="120" y1="116" x2="1080" y2="116" stroke="#30363d" stroke-width="1"/>

    <!-- left accent bar -->
    <rect x="142" y="150" width="3" height="150" rx="1.5" fill="#FFD43B" opacity="0.7"/>

    <!-- prompt line -->
    <text x="168" y="178" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="18">
      <tspan fill="#FFD43B">$</tspan><tspan fill="#8b949e"> whoami</tspan>
    </text>

    <!-- name (output) -->
    <g opacity="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <text x="168" y="240" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-weight="700" font-size="50"><tspan fill="#f0f6fc">Richard Victor</tspan><tspan fill="#FFD43B" dx="12">&#9612;<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
    </g>

    <!-- role -->
    <g opacity="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <text x="170" y="282" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="19" fill="#3776AB">Backend &amp; AI Developer · Founder @ Trama Digital</text>
    </g>

    <!-- location/mission -->
    <g opacity="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
      <text x="170" y="312" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="15" fill="#8b949e">Sorocaba, BR&#160;&#160;→&#160;&#160;building for the world</text>
    </g>
  </g>
</svg>
